<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japanischzimmer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Sora:wght@300;400;500;600;700;800&family=Nunito:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14101e;
    --bg-panel: #1e1728;
    --bg-panel-2: #271d36;
    --violet: #8b5cf6;
    --violet-deep: #6d28d9;
    --pink: #ec4899;
    --pink-soft: #f0abfc;
    --text: #f5f1fb;
    --muted: #a99cc7;
    --line: rgba(139, 92, 246, 0.22);
    --radius: 18px;
  }
  *{ box-sizing: border-box; }
  html, body{ height:100%; margin:0; overflow:hidden; }
  html{ font-size: 18px; }
  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    -webkit-font-smoothing: antialiased;
    transition: background-color .42s ease, color .32s ease;
  }

  .stage{
    transition: background-image .5s ease, background-color .5s ease;
  }

  .window,
  .window-content,
  .tile-btn,
  .kana-card,
  .resource-card,
  .mini-card,
  .guide-progress,
  .guide-step,
  .toc-item,
  .bubble,
  .top-controls button{
    transition:
      background-color .32s ease,
      border-color .32s ease,
      color .32s ease,
      box-shadow .32s ease;
  }

  .home-intro p,
  .tile-btn .label,
  .tile-progress-label,
  .win-p,
  .win-list,
  .faq-item p,
  .mini-card p,
  .desktop-footer{
    transition: color .32s ease;
  }

  /* Der Anfänger-Guide bleibt bewusst direkter und ohne weiche Theme-Animation. */
  .tile-btn.featured,
  .tile-btn.featured *,
  .guide-progress,
  .guide-progress *{
    transition-duration: .15s;
  }
  .jp{ font-family:'Shippori Mincho', serif; }
  a{ color:inherit; }
  ::selection{ background: var(--violet); color:white; }
  button{ font-family: inherit; }
  .eyebrow{
    font-family:'JetBrains Mono', monospace; font-size:0.66rem;
    letter-spacing:0.12em; text-transform:uppercase; color: var(--pink-soft);
  }

  /* ---------- Bühne ---------- */
  .stage{
    position:relative; width:100%; height:100%; overflow:hidden;
    background: url('Background.png') center center / cover no-repeat, #0f0b17;
  }
  body.light .stage{
    background:
      url('Background white.png') center center / cover no-repeat,
      #f7f0e8;
  }

  body.light{
    --bg:#f7f0e8;
    --bg-panel:#fffaf4;
    --bg-panel-2:#f8eef7;
    --text:#342640;
    --muted:#756786;
    --line:rgba(177,112,180,0.28);
  }

  /* Steuerung oben links */
  .top-controls{ position:fixed; top:18px; left:20px; z-index:500; display:flex; gap:14px; }
  .top-controls button{
    background: rgba(255,255,255,0.06); border:1px solid var(--line); border-radius:10px;
    width:34px; height:34px; color:var(--text); font-size:1rem; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition: transform .15s ease, background .15s ease;
  }
  .top-controls button:hover{ transform: translateY(-2px); background: rgba(255,255,255,0.12); }

  /* ---------- Fenster ---------- */
.window {
  position: fixed;

  width: min(86vw, 1100px);
  height: min(75vh, 450px);

  min-width: 320px;
  min-height: 300px;

  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);

  background: var(--bg-panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: 0 28px 64px -16px rgba(0, 0, 0, 0.6);

  display: flex;
  flex-direction: column;
  overflow: hidden;

  opacity: 0;
  pointer-events: none;

  transition:
    opacity 0.16s ease,
    transform 0.16s ease;

  z-index: 20;
}
  .window.open{ opacity:1; pointer-events:all; }
  .window.resizing{ transition:none; }

  #window-home{
    top:50%; left:50%; transform:translate(-50%,-50%);
    width:min(74vw, 1140px);
    height:min(74vh, 780px);
    max-height:84vh;
    min-width:420px;
    z-index:5;
    opacity:1;
    pointer-events:all;
    container-type:size;
  }
  #window-home.open{ transform:translate(-50%,-50%) scale(1); }
  #window-home.resizing{ transition:none; }

  .resize-handle{
    position:absolute; right:2px; bottom:2px;
    width:20px; height:20px;
    cursor: nwse-resize;
    touch-action:none;
    display:flex; align-items:flex-end; justify-content:flex-end;
    padding: 3px;
    z-index: 2;
  }
  .resize-handle svg{ opacity:0.55; transition:opacity .15s ease; }
  .resize-handle:hover svg{ opacity:1; }

  .window-titlebar{
    height:46px; flex-shrink:0;
    background: linear-gradient(100deg, var(--violet), var(--pink));
    display:flex; align-items:center; justify-content:space-between;
    padding: 0 10px 0 18px;
    cursor:grab; touch-action:none;
    transition: background .36s ease, color .32s ease;
  }
  .window-titlebar:active{ cursor:grabbing; }
  .window-titlebar.static{ cursor:default; }
  .window-titlebar .tab-label{
    font-family:'Zen Kaku Gothic New', sans-serif; font-weight:700; font-size:0.92rem;
    color:#1a1424; letter-spacing:0.01em;
  }
  .win-close{
    width:28px; height:28px; border-radius:50%;
    background: rgba(26,20,36,0.28); border:none; color:#1a1424;
    font-size:0.8rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition: background .15s ease, color .15s ease;
  }
  .win-close:hover{ background:#1a1424; color:#fff; }

  .window-content{
    padding:36px clamp(16px,4vw,45px) 40px;
    overflow-y:auto;
    overflow-x:hidden;
    flex:1 1 auto;
    min-height:0;
    position:relative;
  }

  .home-intro{
    text-align:center;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    min-height:0;
    height:100%;
    overflow:hidden;
    gap:clamp(14px, 2.4cqh, 28px);
    padding:
      clamp(28px, 4.8cqh, 52px)
      clamp(26px, 4cqw, 56px)
      clamp(28px, 4.2cqh, 44px);
  }
  #window-home .window-content{
    padding:0;
    overflow:hidden;
  }

  .home-intro h1{
    font-family:'Nunito', sans-serif;
    font-size:clamp(1.5rem, min(4.5cqw, 4.8cqh), 2.55rem);
    line-height:1.12;
    overflow-wrap:anywhere;
    margin:0;
    flex:0 0 auto;
  }
  .home-intro h1 .accent{ color: var(--pink-soft); }
  .home-intro p{
    color:var(--muted);
    font-size:clamp(0.82rem, min(1.8cqw, 1.95cqh), 1.02rem);
    line-height:1.45;
    margin:0;
    flex:0 0 auto;
  }

  .tile-grid{
    display:grid;
    grid-template-columns:repeat(3, minmax(0, 1fr));
    grid-template-rows:repeat(2, minmax(0, 1fr));
    gap:
      clamp(14px, 2.2cqh, 24px)
      clamp(14px, 2.2cqw, 24px);
    flex:1 1 auto;
    min-height:0;
    height:100%;
    align-content:stretch;
  }
  .tile-btn{
    background:var(--bg-panel-2);
    border:1px solid var(--line);
    border-radius:clamp(12px, 1.7cqw, 18px);
    padding:
      clamp(18px, 3.2cqh, 34px)
      clamp(16px, 2.6cqw, 24px);
    cursor:pointer;
    color:var(--text);
    min-width:0;
    min-height:0;
    height:100%;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:clamp(8px, 1.5cqh, 16px);
    transition:transform .15s ease, border-color .15s ease, background .15s ease;
  }
  .tile-btn:hover{
    transform: translateY(-3px);
    border-color: transparent;
    background: linear-gradient(160deg, var(--violet), var(--pink));
  }
  .tile-btn .glyph{
    font-size:clamp(1.55rem, min(4.6cqw, 5.2cqh), 2.7rem);
    line-height:1;
    font-family:'Noto Sans JP', sans-serif;
    font-weight:700;
    flex:0 0 auto;
  }
  .tile-btn .label{
    font-size:clamp(0.72rem, min(1.65cqw, 1.85cqh), 0.95rem);
    color:var(--muted);
    text-align:center;
    line-height:1.35;
    overflow-wrap:anywhere;
    flex:0 0 auto;
  }
  .tile-btn:hover .label{ color: rgba(255,255,255,0.92); }

  @container (max-width: 560px){
    .tile-grid{
      grid-template-columns:repeat(2, minmax(0, 1fr));
    }
  }

  @container (max-width: 520px){
    #window-home .window-content{
    padding:0;
    overflow:hidden;
  }

  .home-intro h1{
      font-size:clamp(1.3rem, 7cqw, 1.65rem);
      margin-top:0;
    }

    .home-intro p{
      font-size:0.78rem;
      margin-bottom:0.9rem;
    }

    .tile-grid{
      grid-template-columns:1fr;
      grid-template-rows:repeat(6, minmax(64px, 1fr));
      gap:8px;
      overflow:hidden;
    }

    .tile-btn{
      min-height:76px;
      height:auto;
      display:grid;
      grid-template-columns:42px minmax(0, 1fr);
      grid-template-areas:
        "glyph label"
        "glyph progress";
      align-items:center;
      justify-items:start;
      column-gap:12px;
      row-gap:4px;
      padding:12px 14px;
      text-align:left;
    }

    .tile-btn .glyph{
      grid-area:glyph;
      font-size:1.7rem;
    }

    .tile-btn .label{
      grid-area:label;
      text-align:left;
      font-size:0.72rem;
      width:100%;
    }

    .tile-progress{
      grid-area:progress;
      width:100%;
      margin:0;
    }

    .tile-progress-label{
      grid-area:progress;
      justify-self:end;
      align-self:end;
      font-size:0.48rem;
      transform:translateY(14px);
    }

    .tile-btn.featured::after{
      top:-8px;
      left:14px;
      transform:none;
      font-size:0.46rem;
    }
  }


  @container (max-width: 360px){
    .window-content{
      padding-left:12px;
      padding-right:12px;
    }

    .tile-btn{
      grid-template-columns:34px minmax(0, 1fr);
      padding:10px 12px;
    }

    .tile-btn .glyph{
      font-size:1.45rem;
    }
  }


  @container (max-height: 560px){
    #window-home .window-content{
    padding:0;
    overflow:hidden;
  }

  .home-intro h1{
      margin-top:0;
      font-size:clamp(1.45rem, 4cqh, 2rem);
    }

    .home-intro p{
      margin-bottom:1rem;
      font-size:0.9rem;
    }

    .tile-grid{
      grid-template-rows:repeat(2, minmax(0, 1fr));
    }

    .tile-btn{
      padding:10px 10px 8px;
      gap:4px;
    }

    .tile-progress-label{
      font-size:0.52rem;
    }
  }

  @container (max-height: 430px){
    #window-home .window-content{
    padding:0;
    overflow:hidden;
  }

  .home-intro h1{
      font-size:1.35rem;
      margin-bottom:0.1em;
    }

    .home-intro p{
      display:none;
    }

    .tile-grid{
      grid-template-rows:repeat(2, minmax(0, 1fr));
      gap:6px;
    }

    .tile-btn .glyph{
      font-size:1.45rem;
    }

    .tile-btn .label{
      font-size:0.62rem;
    }

    .tile-progress{
      height:3px;
    }
  }

  .tile-btn.featured{
    position:relative;
    padding-top:clamp(28px, 4.2cqh, 42px);
    border-color: rgba(240,171,252,0.72);
    background:
      linear-gradient(var(--bg-panel-2), var(--bg-panel-2)) padding-box,
      linear-gradient(135deg, var(--pink), var(--violet)) border-box;
    box-shadow: 0 12px 28px -18px rgba(236,72,153,0.9);
  }

  .tile-btn.featured:hover{
    transform: translateY(-3px);
    border-color: transparent;
    background: linear-gradient(160deg, var(--violet), var(--pink));
    box-shadow: 0 16px 30px -16px rgba(236,72,153,0.9);
  }

  .tile-btn.featured:hover .label,
  .tile-btn.featured:hover .tile-progress-label{
    color: rgba(255,255,255,0.94);
  }

  .tile-btn.featured:hover .tile-progress{
    background: rgba(255,255,255,0.22);
  }
  .tile-btn.featured::after{
    content:"Empfohlener Start";
    position:absolute;
    top:-9px;
    left:50%;
    transform:translateX(-50%);
    white-space:nowrap;
    padding:4px 8px;
    border-radius:999px;
    background:linear-gradient(120deg, var(--pink), var(--violet));
    color:white;
    font-family:'JetBrains Mono', monospace;
    font-size:clamp(0.42rem, min(1.1cqw, 1.2cqh), 0.62rem);
    letter-spacing:0.04em;
  }
  .tile-progress{
    width:clamp(56%, 68%, 74%);
    margin-top:2px;
    height:clamp(3px, 0.45cqh, 5px);
    border-radius:999px;
    overflow:hidden;
    background:rgba(255,255,255,0.09);
  }
  .tile-progress > span{
    display:block;
    width:0%;
    height:100%;
    border-radius:inherit;
    background:linear-gradient(90deg, var(--pink), var(--violet));
    transition:width .2s ease;
  }
  .tile-progress-label{
    font-family:'JetBrains Mono', monospace;
    font-size:clamp(0.5rem, min(1.1cqw, 1.2cqh), 0.66rem);
    color:var(--muted);
    margin-top:2px;
    flex:0 0 auto;
  }

  .guide-progress{
    margin: 0 0 1.5em;
    padding:18px;
    border:1px solid var(--line);
    border-radius:14px;
    background:var(--bg-panel-2);
  }
  .guide-progress-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:10px;
  }
  .guide-progress-title{ font-weight:700; font-size:0.95rem; }
  .guide-progress-count{
    font-family:'JetBrains Mono', monospace;
    color:var(--pink-soft);
    font-size:0.75rem;
  }
  .guide-progress-bar{
    height:8px;
    overflow:hidden;
    border-radius:999px;
    background:rgba(255,255,255,0.08);
    margin-bottom:14px;
  }
  .guide-progress-fill{
    width:0%;
    height:100%;
    border-radius:inherit;
    background:linear-gradient(90deg, var(--pink), var(--violet));
    transition:width .2s ease;
  }
  .guide-checklist{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
    gap:8px;
  }
  .guide-step{
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 12px;
    background:rgba(255,255,255,0.025);
    color:var(--text);
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:9px;
    text-align:left;
    font-size:0.82rem;
    transition:border-color .15s ease, background .15s ease, transform .15s ease;
  }
  .guide-step:hover{ border-color:var(--violet); transform:translateY(-1px); }
  .guide-step::before{
    content:"○";
    color:var(--pink-soft);
    font-family:'JetBrains Mono', monospace;
  }
  .guide-step.done{
    background:rgba(139,92,246,0.12);
    border-color:rgba(240,171,252,0.5);
  }
  .guide-step.done::before{ content:"✓"; }

  .win-eyebrow{ margin-bottom:6px; display:block; }
  .win-h2{ font-family:'Nunito', sans-serif; font-size:1.55rem; margin:0.1em 0 0.9em; }
  .win-h3{ font-family:'Nunito', sans-serif; font-size:1.12rem; margin:1.3em 0 0.6em; color: var(--pink-soft); }

  .win-h3.collapsible-title{
    position:relative;
    padding-right:2rem;
    cursor:pointer;
    user-select:none;
    transition:color .15s ease, opacity .15s ease;
  }
  .win-h3.collapsible-title:hover{
    color:var(--pink);
  }
  .win-h3.collapsible-title::after{
    content:"⌄";
    position:absolute;
    right:0.2rem;
    top:50%;
    transform:translateY(-50%) rotate(0deg);
    font-family:'Sora', sans-serif;
    font-size:1rem;
    color:var(--muted);
    transition:transform .18s ease, color .18s ease;
  }
  .win-h3.collapsible-title[aria-expanded="false"]::after{
    transform:translateY(-50%) rotate(-90deg);
  }
  .win-h3.collapsible-title:hover::after{
    color:var(--pink-soft);
  }
  .collapsible-hidden{
    display:none !important;
  }
  .win-p{ color: var(--muted); font-size:0.98rem; line-height:1.75; margin:0 0 1.05em; }

  .win-list{ margin: 0 0 1.1em; padding-left: 1.3em; color: var(--muted); font-size:0.96rem; line-height:1.75; }
  .win-list li{ margin-bottom: 0.4em; }
  .win-list li strong{ color: var(--text); }

  .win-navigation{ display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-top:1.6em; }
  .win-navigation .toc-item{ flex:1 1 auto; text-align:center; justify-content:center; margin-bottom:0; }

  .kana-grid, .resource-grid{
    display:grid; grid-template-columns: repeat(auto-fit, minmax(230px,1fr)); gap: 14px; margin: 1.2em 0;
  }
  .kana-card, .resource-card{
    background: var(--bg-panel-2); border:1px solid var(--line); border-radius: 14px;
    padding: 18px 18px 16px; display:block;
  }
  .kana-card .win-h3, .resource-card .win-h3{ margin-top:0.2em; }
  .kana-card .toc-item, .resource-card .toc-item{ margin-top: 0.6em; }

  .kana-table{
    display:grid; gap:6px; margin: 0.9em 0 1.3em;
  }
  .kana-cell{
    background: var(--bg-panel-2); border:1px solid var(--line); border-radius:8px;
    padding: 8px 4px 7px; text-align:center; display:flex; flex-direction:column; align-items:center; gap:2px;
  }
  .kana-cell.empty{ background:none; border:none; }
  .kana-cell .char{ font-size:1.45rem; font-family:'Noto Sans JP', sans-serif; font-weight:500; line-height:1.1; }
  .kana-cell .romaji{ font-size:0.62rem; color: var(--muted); font-family:'JetBrains Mono', monospace; }

  .inline-link{
    background:none; border:none; padding:0; margin:0; color: var(--pink-soft);
    text-decoration: underline dotted; text-underline-offset:3px; cursor:pointer;
    font-size:inherit; font-family:inherit;
  }
  .inline-link:hover{ color: var(--violet); }

  .toc-list{ list-style:none; margin:0; padding:0; counter-reset: toc; }
  .toc-list li{ counter-increment: toc; }
  .toc-item{
    width:100%; text-align:left; background: var(--bg-panel-2); border:1px solid var(--line);
    border-radius:10px; padding: 13px 16px; margin-bottom:8px; display:flex; align-items:center; gap:12px;
    color: var(--text); cursor:pointer; transition: border-color .15s ease, transform .15s ease; font-size:0.95rem;
    text-decoration:none; box-sizing:border-box;
  }
  .toc-item:hover{ border-color: var(--violet); transform: translateX(3px); }
  .toc-list .toc-item::before{
    content: counter(toc, decimal-leading-zero);
    font-family:'JetBrains Mono', monospace; font-size:0.76rem; color: var(--pink-soft);
  }

  .grid-cards{ display:grid; grid-template-columns: repeat(auto-fit, minmax(170px,1fr)); gap:12px; }
  .mini-card{ background: var(--bg-panel-2); border:1px solid var(--line); border-radius:10px; padding:14px 16px; }
  .mini-card h4{ margin:0 0 6px; font-size:0.95rem; }
  .mini-card p{ margin:0; color: var(--muted); font-size:0.87rem; line-height:1.55; }

  .placeholder-tag{
    display:inline-block; margin-top:6px; font-family:'JetBrains Mono', monospace;
    font-size:0.7rem; color: var(--pink-soft); border-left:2px dashed var(--violet); padding-left:8px;
  }

  .faq-item{ border-bottom:1px solid var(--line); padding:14px 0; }
  .faq-item summary{ cursor:pointer; font-weight:600; list-style:none; display:flex; justify-content:space-between; align-items:center; font-size:0.97rem; }
  .faq-item summary::-webkit-details-marker{ display:none; }
  .faq-item summary::after{ content:"+"; color: var(--pink-soft); font-size:1.15rem; }
  .faq-item[open] summary::after{ content:"–"; }
  .faq-item p{ color: var(--muted); font-size:0.9rem; line-height:1.65; margin-top:8px; }

  .btn{
    padding:11px 20px; border-radius:999px; font-weight:600; font-size:0.88rem;
    text-decoration:none; display:inline-flex; align-items:center; gap:8px; border:none; cursor:pointer;
  }
  .btn-primary{ background: linear-gradient(120deg, var(--pink), var(--violet)); color:white; }
  .btn-ghost{ border:1px solid var(--line); color: var(--text); background:transparent; }
  .btn-discord{ background:#5865F2; color:white; }
  .btn svg{ flex-shrink:0; }

  /* ---------- Wegweiser (Quest-Begleiter) ---------- */
  .wegweiser{
    position: fixed;

/* ===================== Fortschritt Anfänger-Guide ===================== */
const GUIDE_PROGRESS_KEY = 'japanischzimmer-guide-progress-v1';
const GUIDE_STEPS = ['kana', 'wortschatz', 'grammatik', 'immersion', 'mining'];

function getGuideProgress(){
  try{
    const saved = JSON.parse(localStorage.getItem(GUIDE_PROGRESS_KEY) || '[]');
    return new Set(Array.isArray(saved) ? saved.filter(step => GUIDE_STEPS.includes(step)) : []);
  } catch {
    return new Set();
  }
}

function saveGuideProgress(progress){
  localStorage.setItem(GUIDE_PROGRESS_KEY, JSON.stringify([...progress]));
}

function updateGuideProgressUI(){
  const progress = getGuideProgress();
  const done = progress.size;
  const percent = (done / GUIDE_STEPS.length) * 100;

  const guideFill = document.getElementById('guideProgressFill');
  const guideCount = document.getElementById('guideProgressCount');
  const homeFill = document.getElementById('homeGuideProgressFill');
  const homeLabel = document.getElementById('homeGuideProgressLabel');

  if(guideFill) guideFill.style.width = `${percent}%`;
  if(guideCount) guideCount.textContent = `${done} von ${GUIDE_STEPS.length} erledigt`;
  if(homeFill) homeFill.style.width = `${percent}%`;
  if(homeLabel) homeLabel.textContent = done === GUIDE_STEPS.length
    ? 'Guide abgeschlossen ✓'
    : `${done} von ${GUIDE_STEPS.length}`;

  document.querySelectorAll('[data-guide-step]').forEach(button => {
    const isDone = progress.has(button.dataset.guideStep);
    button.classList.toggle('done', isDone);
    button.setAttribute('aria-pressed', String(isDone));
  });
}

function toggleGuideStep(step){
  if(!GUIDE_STEPS.includes(step)) return;
  const progress = getGuideProgress();
  progress.has(step) ? progress.delete(step) : progress.add(step);
  saveGuideProgress(progress);
  updateGuideProgressUI();
}


/* ===================== Einklappbare Guide-Abschnitte ===================== */
const COLLAPSE_STATE_KEY = 'japanischzimmer-collapsed-sections-v1';

function getCollapsedSections(){
  try{
    const saved = JSON.parse(localStorage.getItem(COLLAPSE_STATE_KEY) || '{}');
    return saved && typeof saved === 'object' ? saved : {};
  } catch {
    return {};
  }
}

function saveCollapsedSections(state){
  localStorage.setItem(COLLAPSE_STATE_KEY, JSON.stringify(state));
}

function getSectionSiblings(title){
  const siblings = [];
  let node = title.nextElementSibling;

  while(node && !node.matches('.win-h3')){
    siblings.push(node);
    node = node.nextElementSibling;
  }

  return siblings;
}

function setSectionCollapsed(title, collapsed, persist = true){
  getSectionSiblings(title).forEach(element => {
    element.classList.toggle('collapsible-hidden', collapsed);
  });

  title.setAttribute('aria-expanded', String(!collapsed));

  if(persist){
    const state = getCollapsedSections();
    state[title.dataset.collapseKey] = collapsed;
    saveCollapsedSections(state);
  }
}

function createCollapseKey(title, panelId, index){
  const parentPath = [];
  let parent = title.parentElement;

  while(parent && !parent.classList.contains('window-content')){
    const parentIndex = Array.from(parent.parentElement?.children || []).indexOf(parent);
    parentPath.unshift(parentIndex);
    parent = parent.parentElement;
  }

  return `${panelId}:${parentPath.join('.')}:${index}:${title.textContent.trim()}`;
}

function enhanceCollapsibleSections(contentRoot, panelId){
  const titles = Array.from(contentRoot.querySelectorAll('.win-h3'));
  const state = getCollapsedSections();

  titles.forEach((title, index) => {
    if(title.classList.contains('collapsible-title')) return;

    const key = createCollapseKey(title, panelId, index);
    title.classList.add('collapsible-title');
    title.dataset.collapseKey = key;
    title.setAttribute('role', 'button');
    title.setAttribute('tabindex', '0');

    const collapsed = state[key] === true;
    setSectionCollapsed(title, collapsed, false);

    const toggle = () => {
      const isExpanded = title.getAttribute('aria-expanded') === 'true';
      setSectionCollapsed(title, isExpanded);
    };

    title.addEventListener('click', toggle);
    title.addEventListener('keydown', event => {
      if(event.key === 'Enter' || event.key === ' '){
        event.preventDefault();
        toggle();
      }
    });
  });
}

/* ===================== Fenstergrößen merken ===================== */
const WINDOW_SIZE_KEY = 'japanischzimmer-window-sizes-v1';

const LARGE_GUIDE_WINDOWS = new Set([
  'guide', 'toc', 'kana', 'hiragana', 'katakana', 'kanji',
  'grammatik', 'wortschatz', 'hoeren', 'ressourcen', 'jlpt',
  'kultur', 'reading', 'immersion'
]);

const MEDIUM_WINDOWS = new Set([
  'faq', 'kontakt'
]);

function clamp(value, min, max){
  return Math.min(Math.max(value, min), max);
}

function getDefaultWindowSize(id){
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  // Große Inhaltsfenster sollen ungefähr 60–70 % des Bildschirms nutzen.
  if(LARGE_GUIDE_WINDOWS.has(id)){
    return {
      width: clamp(Math.round(vw * 0.66), 820, Math.round(vw * 0.88)),
      height: clamp(Math.round(vh * 0.74), 560, Math.round(vh * 0.88))
    };
  }

  // Kleinere Utility-Fenster bleiben kompakter, aber dennoch deutlich nutzbar.
  if(MEDIUM_WINDOWS.has(id)){
    return {
      width: clamp(Math.round(vw * 0.56), 620, Math.round(vw * 0.82)),
      height: clamp(Math.round(vh * 0.60), 420, Math.round(vh * 0.78))
    };
  }

  // Fallback für alles andere.
  return {
    width: clamp(Math.round(vw * 0.60), 720, Math.round(vw * 0.86)),
    height: clamp(Math.round(vh * 0.66), 480, Math.round(vh * 0.84))
    };
}


function getSavedWindowSizes(){
  try{
    const saved = JSON.parse(localStorage.getItem(WINDOW_SIZE_KEY) || '{}');
    return saved && typeof saved === 'object' ? saved : {};
  } catch {
    return {};
  }
}

function saveWindowSize(id, width, height){
  const sizes = getSavedWindowSizes();
  sizes[id] = { width, height };
  localStorage.setItem(WINDOW_SIZE_KEY, JSON.stringify(sizes));
}

function applySavedWindowSize(id, el){
  const defaults = getDefaultWindowSize(id);
  el.style.width = defaults.width + 'px';
  el.style.height = defaults.height + 'px';

  const sizes = getSavedWindowSizes();
  const saved = sizes[id];
  if(!saved) return;

  if(saved.width) el.style.width = Math.max(420, saved.width) + 'px';
  if(saved.height) el.style.height = Math.max(360, saved.height) + 'px';
}

/* ===================== Fenster-Engine ===================== */
const windowsRoot = document.getElementById('windows-root');
const homeEl = document.getElementById('window-home');
const state = {};
let zCounter = 20;
let openCount = 0;
let activeId = 'home';
let activeEl = homeEl;

function buildWindow(id){
  const data = panels[id];
  const el = document.createElement('div');
  el.className = 'window';
  el.id = 'window-' + id;
  el.innerHTML = `
    <div class="window-titlebar">
      <span class="tab-label">${data.title}</span>
      <button class="win-close" data-close="${id}">✕</button>
    </div>
    <div class="window-content">${data.html}</div>
    <div class="resize-handle" title="Größe ändern">
      <svg width="12" height="12" viewBox="0 0 12 12"><path d="M11 1 L1 11 M11 5 L5 11 M11 9 L9 11" stroke="var(--muted)" stroke-width="1.4" stroke-linecap="round"/></svg>
    </div>
  `;
  windowsRoot.appendChild(el);
  applySavedWindowSize(id, el);
  enhanceCollapsibleSections(el.querySelector('.window-content'), id);
  updateGuideProgressUI();
  makeDraggable(el, el.querySelector('.window-titlebar'));
  makeResizable(el, el.querySelector('.resize-handle'));
  el.addEventListener('pointerdown', () => setActive(id, el));
  el.querySelector('[data-close]').addEventListener('click', (e) => {
    e.stopPropagation();
    el.classList.remove('open');

    if(state[id]){
      state[id].persistent = false;
    }

    if(activeId === id) setActive('home', homeEl);
  });
  return el;
}

function bringToFront(el){ zCounter += 1; el.style.zIndex = zCounter; }

function positionCascade(el){
  const idx = openCount % 6;
  openCount += 1;
  const offset = idx * 26;

  // Inhaltsfenster werden direkt mit echten Pixelkoordinaten positioniert.
  // Dadurch bleibt beim allerersten Ziehen keine translate-Zentrierung übrig,
  // die das Fenster seitlich springen lassen könnte.
  const rect = el.getBoundingClientRect();
  const centeredLeft = Math.max(12, (window.innerWidth - rect.width) / 2 + offset);
  const centeredTop = Math.max(12, (window.innerHeight - rect.height) / 2 + offset);

  el.style.transition = 'none';
  el.style.transform = 'none';
  el.style.left = centeredLeft + 'px';
  el.style.top = centeredTop + 'px';

  // Nach einem Frame darf die normale Einblendanimation wieder greifen.
  requestAnimationFrame(() => {
    el.style.transition = '';
  });
}

function setActive(id, el){
  activeId = id; activeEl = el;
  if(id !== 'home') bringToFront(el);
  updateWegweiser();
}

function closeAllContentWindows(){
  Object.values(state).forEach(entry => {
    entry.el.classList.remove('open');
    entry.persistent = false;
  });
  setActive('home', homeEl);
}

function openWindow(id, opener = null){
  if(!panels[id]) return;

  const sourceWindow = opener ? opener.closest('.window') : null;
  const openedFromHome = sourceWindow?.id === 'window-home';
  const sourceId = sourceWindow && sourceWindow.id !== 'window-home'
    ? sourceWindow.id.replace('window-', '')
    : null;

  let s = state[id];
  if(!s){
    s = {
      el: buildWindow(id),
      positioned: false,
      persistent: false
    };
    state[id] = s;
  }

  if(openedFromHome){
    // Direkt aus dem Startmenü geöffnete Fenster gelten als Hauptfenster.
    s.persistent = true;
  } else {
    // Navigation innerhalb eines Fensters:
    // Das Quellfenster wird geschlossen, damit z. B. das Inhaltsverzeichnis
    // beim Öffnen von Kana nicht im Hintergrund offen bleibt.
    if(sourceId && state[sourceId]){
      state[sourceId].el.classList.remove('open');
      state[sourceId].persistent = false;
    }

    // Andere nicht-persistente Guide-/Unterfenster ebenfalls schließen.
    Object.entries(state).forEach(([windowId, entry]) => {
      if(windowId !== id && !entry.persistent){
        entry.el.classList.remove('open');
      }
    });
  }

  if(!s.positioned){
    positionCascade(s.el);
    s.positioned = true;
  }

  s.el.classList.add('open');
  setActive(id, s.el);

  const content = s.el.querySelector('.window-content');
  if(content) content.scrollTop = 0;
}

function makeDraggable(win, titlebar){
  let dragging = false;
  let startX = 0;
  let startY = 0;
  let origX = 0;
  let origY = 0;

  titlebar.addEventListener('pointerdown', (e) => {
    if(e.target.closest('.win-close')) return;

    dragging = true;
    setActive(win.id.replace('window-','') || 'home', win);

    startX = e.clientX;
    startY = e.clientY;

    const rect = win.getBoundingClientRect();
    origX = rect.left;
    origY = rect.top;

    // Vor dem Ziehen auf feste Koordinaten wechseln, damit nichts springt.
    win.style.transition = 'none';
    win.style.transform = 'none';
    win.style.left = origX + 'px';
    win.style.top = origY + 'px';

    titlebar.setPointerCapture(e.pointerId);
  });

  titlebar.addEventListener('pointermove', (e) => {
    if(!dragging) return;

    const maxLeft = Math.max(12, window.innerWidth - win.offsetWidth - 12);
    const maxTop = Math.max(12, window.innerHeight - win.offsetHeight - 12);

    const nextLeft = Math.min(
      Math.max(12, origX + (e.clientX - startX)),
      maxLeft
    );

    const nextTop = Math.min(
      Math.max(12, origY + (e.clientY - startY)),
      maxTop
    );

    win.style.left = nextLeft + 'px';
    win.style.top = nextTop + 'px';

    positionWegweiser();
  });

  function stopDragging(){
    if(!dragging) return;
    dragging = false;

    requestAnimationFrame(() => {
      win.style.transition = '';
    });
  }

  titlebar.addEventListener('pointerup', stopDragging);
  titlebar.addEventListener('pointercancel', stopDragging);
}

function makeResizable(win, handle){
  let resizing = false;
  let startX = 0;
  let startY = 0;
  let startW = 0;
  let startH = 0;

  handle.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    e.stopPropagation();

    resizing = true;
    setActive(win.id.replace('window-','') || 'home', win);

    const rect = win.getBoundingClientRect();
    startX = e.clientX;
    startY = e.clientY;
    startW = rect.width;
    startH = rect.height;

    // Beim ersten Resize von CSS-/Auto-Größen auf feste Pixel wechseln.
    win.style.width = startW + 'px';
    win.style.height = startH + 'px';
    win.style.maxHeight = '92vh';
    win.classList.add('resizing');

    handle.setPointerCapture(e.pointerId);
  });

  handle.addEventListener('pointermove', (e) => {
    if(!resizing) return;

    const computed = getComputedStyle(win);
    const minW = parseFloat(computed.minWidth) || 320;
    const minH = parseFloat(computed.minHeight) || 260;
    const maxW = Math.max(minW, window.innerWidth - 24);
    const maxH = Math.max(minH, window.innerHeight - 24);

    const nextWidth = Math.min(
      Math.max(minW, startW + (e.clientX - startX)),
      maxW
    );

    const nextHeight = Math.min(
      Math.max(minH, startH + (e.clientY - startY)),
      maxH
    );

    win.style.width = nextWidth + 'px';
    win.style.height = nextHeight + 'px';

    if(win.id){
      const id = win.id.replace('window-','') || 'home';
      saveWindowSize(id, nextWidth, nextHeight);
    }

    positionWegweiser();
  });

  function stopResizing(){
    if(!resizing) return;
    resizing = false;
    win.classList.remove('resizing');
  }

  handle.addEventListener('pointerup', stopResizing);
  handle.addEventListener('pointercancel', stopResizing);
}

document.addEventListener('click', (e) => {
  const guideStep = e.target.closest('[data-guide-step]');
  if(guideStep){
    toggleGuideStep(guideStep.dataset.guideStep);
    return;
  }

  const opener = e.target.closest('[data-open]');
  if(opener){
    openWindow(opener.getAttribute('data-open'), opener);
    return;
  }

  // Ein Klick auf den freien Hintergrund schließt alle Inhaltsfenster.
  const clickedInterface =
    e.target.closest('.window') ||
    e.target.closest('.wegweiser') ||
    e.target.closest('.top-controls');

  if(!clickedInterface && e.target.closest('.stage')){
    closeAllContentWindows();
  }
});
applySavedWindowSize('home', homeEl);
homeEl.addEventListener('pointerdown', () => setActive('home', homeEl));
makeResizable(homeEl, homeEl.querySelector('.resize-handle'));
updateGuideProgressUI();

/* ===================== Wegweiser-Begleiter ===================== */
const wegweiser = document.getElementById('wegweiser');
const wegweiserText = document.getElementById('wegweiserText');

function updateWegweiser(){
  wegweiserText.textContent = activeId === 'home' ? homeQuest : (panels[activeId] ? panels[activeId].quest : homeQuest);
  positionWegweiser();
}

function positionWegweiser(){
  const rect = activeEl.getBoundingClientRect();
  const compW = wegweiser.offsetWidth || 170;
  const compH = wegweiser.offsetHeight || 220;

  if(window.innerWidth < 760){
    wegweiser.classList.add('mobile-dock');
    return;
  }
  wegweiser.classList.remove('mobile-dock');

  let x, y;
  if(rect.right + compW + 28 < window.innerWidth){
    x = rect.right + 22;
    y = rect.top + rect.height/2 - compH/2;
  } else if(rect.left - compW - 28 > 0){
    x = rect.left - compW - 22;
    y = rect.top + rect.height/2 - compH/2;
  } else {
    x = window.innerWidth/2 - compW/2;
    y = Math.max(rect.top - compH - 14, 14);
  }
  y = Math.min(Math.max(y, 14), window.innerHeight - compH - 14);
  wegweiser.style.left = x + 'px';
  wegweiser.style.top = y + 'px';
}

window.addEventListener('resize', positionWegweiser);

/* ===================== Sonstige Steuerung ===================== */
document.getElementById('modeToggle').addEventListener('click', () => document.body.classList.toggle('light'));

/* initial */
updateWegweiser();
